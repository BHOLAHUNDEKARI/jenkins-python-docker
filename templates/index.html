<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jenkins Flask App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(120deg, #1d2671, #c33764);
            color: white;
            text-align: center;
        }

        .container {
            margin-top: 100px;
            padding: 40px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        p {
            font-size: 20px;
            opacity: 0.9;
        }

        .card {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 30px;
            max-width: 600px;
            margin: auto;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #00e676;
            color: black;
            font-weight: bold;
            border-radius: 25px;
        }

        footer {
            margin-top: 60px;
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>🚀 Flask App</h1>
            <p>Built with <b>Python + Docker + Jenkins</b></p>
            <p>CI/CD Pipeline Working Successfully 🎉</p>

            <div class="badge">
                ✅ Running via Jenkins Pipeline
            </div>
        </div>

        <footer>
            <p>Created by Bhola | DevOps Practice Project</p>
        </footer>
    </div>

</body>
</html>

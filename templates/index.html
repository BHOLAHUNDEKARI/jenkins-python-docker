<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Animated Demo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(270deg, #667eea, #764ba2, #43cea2);
      background-size: 600% 600%;
      animation: bgMove 15s ease infinite;
      overflow: hidden;
      color: white;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 10px #fff; }
      to { text-shadow: 0 0 30px #00ffd5; }
    }

    p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    .btn {
      margin-top: 25px;
      padding: 14px 32px;
      border: none;
      border-radius: 30px;
      background: #00ffd5;
      color: #000;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .btn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 25px #00ffd5;
    }

    /* Flying cards */
    .card {
      position: absolute;
      width: 160px;
      height: 100px;
      background: rgba(255,255,255,0.15);
      border-radius: 15px;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      animation: float 12s linear infinite;
    }

    @keyframes float {
      0% {
        transform: translateY(110vh) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 1; }
      100% {
        transform: translateY(-150px) rotate(360deg);
        opacity: 0;
      }
    }

    .card:nth-child(1) { left: 10%; animation-delay: 0s; }
    .card:nth-child(2) { left: 30%; animation-delay: 2s; }
    .card:nth-child(3) { left: 50%; animation-delay: 4s; }
    .card:nth-child(4) { left: 70%; animation-delay: 6s; }
    .card:nth-child(5) { left: 85%; animation-delay: 8s; }

    footer {
      position: absolute;
      bottom: 15px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="center">
    <h1>🚀 CI/CD Demo</h1>
    <p>Animated • Interactive • Modern UI</p>
    <button class="btn" onclick="alert('This is a frontend demo!')">
      Click Me
    </button>
  </div>

  <!-- Flying elements -->
  <div class="card">HTML</div>
  <div class="card">CSS</div>
  <div class="card">JavaScript</div>
  <div class="card">CI/CD</div>
  <div class="card">DevOps</div>

  <footer>
    Built to impress ✨
  </footer>

</body>
</html>
